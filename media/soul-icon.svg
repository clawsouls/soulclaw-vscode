<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Gun barrel / rifling - monochrome for VSCode sidebar -->
  <!-- Outer circle -->
  <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Rifling grooves (6 lines from inner to outer) -->
  <line x1="12" y1="5" x2="11" y2="1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="8.5" x2="21" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="15.5" x2="21" y2="18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="19" x2="11" y2="22.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="15.5" x2="3" y2="18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="8.5" x2="3" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Rifling spiral rings -->
  <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="0.8" stroke-dasharray="4.5 4.4" fill="none" opacity="0.7"/>
  <!-- Center bore -->
  <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
</svg>
